_dataset_: &exp_dataset_config
  _target_: neural_laplacian.datasets.ImageManifoldDataset
  deterministic_sampling: True
  files_path_cache: null
  scalar_field_config:
    _target_: neural_laplacian.configs.ScalarFieldConfig
    generators:
      - _target_: neural_laplacian.generators.UniformFieldGenerator
        min_val_range: [-1, 1]
        max_val_range: null
        num_fields: 200
  num_workers: 5
_exp_train_dataset_config_: &exp_train_dataset_config
  <<: *exp_dataset_config
  max_items: null
  file_size: null
  labels_pkl_path: null
  name: 'caltech256_train'
  sampling_config:
    _target_: neural_laplacian.configs.UniformSamplingConfig
    samples: 100
  root_dirs:
    - _target_: pathlib.Path
      _args_: ["F:/imagenette2/train"]
  batches: 1
_exp_val_dataset_config1_: &exp_val_dataset_config1
  <<: *exp_dataset_config
  max_items: null
  file_size: null
  labels_pkl_path: './assets/imagenette_val_mapping.pkl'
  name: 'caltech256_test'
  sampling_config:
    _target_: neural_laplacian.configs.UniformSamplingConfig
    samples: 100
  root_dirs:
    - _target_: pathlib.Path
#      _args_: ["F:/caltech256/split/test"]
      _args_: ["F:/imagenette2/val"]
  batches: 1
