module:
  _target_: neural_laplacian.data_modules.DataModule
  train_dataset_specification:
    _target_: neural_laplacian.data_modules.DatasetSpecification
    dataset: *exp_train_dataset_config
    batch_size: 40
    num_workers: 7
    shuffle: True
    persistent_workers: False
    pin_memory: False
    drop_last: True
  val_dataset_specifications:
    - _target_: neural_laplacian.data_modules.DatasetSpecification
      dataset: *exp_val_dataset_config_mpz14
      batch_size: 5
      num_workers: 0
      shuffle: False
      persistent_workers: False
      pin_memory: False
      drop_last: False
    - _target_: neural_laplacian.data_modules.DatasetSpecification
      dataset: *exp_val_dataset_config_shrec07
      batch_size: 5
      num_workers: 0
      shuffle: False
      persistent_workers: False
      pin_memory: False
      drop_last: False
    - _target_: neural_laplacian.data_modules.DatasetSpecification
      dataset: *exp_val_dataset_config_shrec14
      batch_size: 5
      num_workers: 0
      shuffle: False
      persistent_workers: False
      pin_memory: False
      drop_last: False
    - _target_: neural_laplacian.data_modules.DatasetSpecification
      dataset: *exp_val_dataset_config_shrec15
      batch_size: 5
      num_workers: 0
      shuffle: False
      persistent_workers: False
      pin_memory: False
      drop_last: False
    - _target_: neural_laplacian.data_modules.DatasetSpecification
      dataset: *exp_val_dataset_config_shrec19
      batch_size: 5
      num_workers: 0
      shuffle: False
      persistent_workers: False
      pin_memory: False
      drop_last: False
    - _target_: neural_laplacian.data_modules.DatasetSpecification
      dataset: *exp_val_dataset_config_shrec20
      batch_size: 5
      num_workers: 0
      shuffle: False
      persistent_workers: False
      pin_memory: False
      drop_last: False
    - _target_: neural_laplacian.data_modules.DatasetSpecification
