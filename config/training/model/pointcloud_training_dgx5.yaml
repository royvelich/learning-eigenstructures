module:
  _target_: neural_laplacian.modules.laplacian_modules.LaplacianPredictorModule3D
  metric_activation: 'softmax'
  knn_graph_config:
    _target_: neural_laplacian.configs.KnnGraphConfig
    k: null
    loop: True
    cosine: False
  reconstruction_loss:
    _target_: neural_laplacian.losses.ReconstructionLoss
    max_eigenvectors: ${globals.eigenvectors_count}
    use_normalized_laplacian: True
    use_weighted_norm: False
  scalar_field_smoother:
    _target_: neural_laplacian.convolutions.ScalarFieldSmoother
    sigma: 0.1
    normalize_weights: True
    iterations: 20
    cosine: False
    aggr: 'add'
  point_features_module:
    _target_: neural_laplacian.modules.laplacian_modules.PointFeaturesModule
    pos_type:
      _target_: neural_laplacian.modules.laplacian_modules.PosType
      _args_: ["POINTS"]
    feature_extractors: null
#    fourier_feature_extractor:
#      _target_: neural_laplacian.features.NeRFPositionalEncoding
#      output_dim: 120
#    preprocess_mlp: null
    preprocess_mlp:
      _target_: neural_laplacian.modules.architectures.ConfigurableMLP
      channels: [3, 64, 256, 1024]
      use_batch_norm: False
      use_layer_norm: True
      activation: torch.nn.GELU
    core_modules:
      - _target_: neural_laplacian.modules.architectures.ConfigurableTransformer
        transformer_encoder_layer:
          _target_: torch.nn.TransformerEncoderLayer
          d_model: 1024
          nhead: 32
          dim_feedforward: 1024
          activation:
            _target_: torch.nn.GELU
          batch_first: True
          dropout: 0.0
        num_layers: 8

