  scalar_field_smoother:
    _target_: neural_laplacian.convolutions.PolynomialProbeProcessor
    max_degree: 2          # Or [1, 3] for random degree per forward
    normalize_basis: true   # Normalize each basis function to unit norm
    center_positions: true  # Center positions (subtract mean)
    scale_positions: true   # Scale positions (divide by std)

  point_features_module:
    _target_: neural_laplacian.modules.laplacian_modules.PointFeaturesModule
    pos_type:
      _target_: neural_laplacian.modules.laplacian_modules.PosType
      _args_: ["POINTS"]
    feature_extractors: null
