program: ./train.py
command:
  - python
  - ${program}
method: grid
#metric:
#  goal: minimize
#  name: train/unweighted_loss
parameters:
  globals:
    parameters:
      num_fields:
        values:
          - 250
          - 500
      nhead:
        values:
          - 4
          - 8
          - 16
      number_of_samples:
        values:
          - [1000, 2000]
          - [2000, 4000]
      iterations_range:
        values:
          - 10
          - 20
          - 30
          - 40
          - 60
      k:
        values:
          - 10
          - 20
          - 40
          - 60
      num_layers:
        values:
          - 4
          - 6
          - 8
      dims:
        values:
          - fourier_output_dim: 60
            preprocess_input_dim: 69
            model_dim: 256
            feedforward_dim: 256

          - fourier_output_dim: 60
            preprocess_input_dim: 69
            model_dim: 512
            feedforward_dim: 512

          - fourier_output_dim: 60
            features_dim: 69
            model_dim: 1024
            feedforward_dim: 1024

          - fourier_output_dim: 120
            preprocess_input_dim: 129
            model_dim: 256
            feedforward_dim: 256

          - fourier_output_dim: 120
            preprocess_input_dim: 129
            model_dim: 512
            feedforward_dim: 512

          - fourier_output_dim: 120
            preprocess_input_dim: 129
            model_dim: 1024
            feedforward_dim: 1024

      gradient_clip_val:
        values:
          - 0.1
          - 0.2
          - 0.3
          - 0.5
          - 0.0
      activation:
        values:
          - _target_: neural_laplacian.activations.Sine
          - torch.nn.LeakyReLU
          - torch.nn.PReLU
          - torch.nn.ReLU
      seed:
        values:
          - 42
          - 6
          - 2025
      eigenvectors_count:
        value: 20
      num_neighbors:
        value: 50
      smoothing_num_neighbors:
        value: 20
      gnn_num_neighbors:
        value: 20
      normal_num_neighbors:
        value: 20
      feature_num_neighbors:
        value: 20
      ckpt_path:
        value: null
  data_module:
    value:
      module:
        _target_: neural_laplacian.data_modules.DataModule
        train_dataset_specification:
            _target_: neural_laplacian.data_modules.DatasetSpecification
            dataset:
              _target_: neural_laplacian.datasets.PointCloudDataset
              max_items: 5000
#              shuffle_seed:  42
#              start_percent: 0.0
#              end_percent: 1.0
              min_file_size: 0.1
              max_file_size: 15
              replications: 1
              farthest_point_sampling_config:
                _target_: neural_laplacian.configs.FarthestPointSamplingConfig
                number_of_samples: ${globals.number_of_samples}
                perc_of_samples: null
                random_start: True
#              root_dirs:
#                - _target_: pathlib.Path
#                  _args_: ["./assets/validation"]
              root_dirs:
                - _target_: pathlib.Path
                  _args_: ["/workspace/datasets/deftransfer"]
                - _target_: pathlib.Path
                  _args_: ["/workspace/datasets/shrec07"]
                - _target_: pathlib.Path
                  _args_: ["/workspace/datasets/shrec15"]
                - _target_: pathlib.Path
                  _args_: ["/workspace/datasets/shrec19"]
              samples_count: 1
              num_eigenfunctions: ${globals.eigenvectors_count}
              scalar_field_config:
                _target_: neural_laplacian.configs.ScalarFieldConfig
                generators:
                  - _target_: neural_laplacian.generators.UniformFieldGenerator
                    min_val_range: [-1, 1]
                    max_val_range: null
                    num_fields: ${globals.num_fields}
              gaussian_noise_config: null
              decimation_config: null
              feature_extractor: null
              normal_estimation_config: null
              remeshing_config: null
            batch_size: 10
            num_workers: 0
            shuffle: True
        val_dataset_specifications:
          - _target_: neural_laplacian.data_modules.DatasetSpecification
            dataset:
              _target_: neural_laplacian.datasets.PointCloudDataset
              max_items: 5000
#              shuffle_seed: 42
#              start_percent: 0.0
#              end_percent: 1.0
              min_file_size: 0.1
              max_file_size: 15
              replications: 1
              farthest_point_sampling_config:
                _target_: neural_laplacian.configs.FarthestPointSamplingConfig
                number_of_samples: 1500
                perc_of_samples: null
                random_start: True
              root_dirs:
                - _target_: pathlib.Path
                  _args_: ["./assets/validation"]
              samples_count: 1
              num_eigenfunctions: ${globals.eigenvectors_count}
              scalar_field_config:
                _target_: neural_laplacian.configs.ScalarFieldConfig
                generators:
                  - _target_: neural_laplacian.generators.UniformFieldGenerator
                    min_val_range: [-1, 1]
                    max_val_range: null
                    num_fields: ${globals.num_fields}
              gaussian_noise_config: null
              decimation_config: null
              feature_extractor: null
              normal_estimation_config: null
              remeshing_config: null
            batch_size: 1
            num_workers: 0
            shuffle: False
  model:
    value:
      module:
        _target_: neural_laplacian.modules.laplacian_modules.LaplacianPredictorModule
        use_edge_index: True
        knn_graph_config:
            _target_: neural_laplacian.configs.KnnGraphConfig
            k: ${globals.k}
            loop: True
        laplacian_loss_configs:
          - _target_: neural_laplacian.modules.laplacian_modules.LaplacianLossConfig
            loss:
              _target_: neural_laplacian.losses.ReconstructionLoss
              spectrum_width: ${globals.eigenvectors_count}
              chunk_size: null
            weight: 1.0
        scalar_field_smoother:
          _target_: neural_laplacian.convolutions.ScalarFieldSmoother
          sigma: 1.0
          normalize_weights: True
          iterations_range: ${globals.iterations_range}
        vertex_features_module:
          _target_: neural_laplacian.modules.laplacian_modules.VertexFeaturesModule
          fourier_feature_extractor:
            _target_: neural_laplacian.features.NeRFPositionalEncoding
            output_dim: ${globals.dims.fourier_output_dim}
          preprocess_mlp:
            _target_: neural_laplacian.modules.architectures.ConfigurableMLP
            channels: ["${globals.dims.preprocess_input_dim}", "${globals.dims.model_dim}"]
            use_batch_norm: False
            use_layer_norm: False
            activation: null
          core_modules:
            - _target_: neural_laplacian.modules.architectures.ConfigurableTransformer
              transformer_encoder_layer:
                _target_: torch.nn.TransformerEncoderLayer
                d_model: ${globals.dims.model_dim}
                nhead: ${globals.nhead}
                dim_feedforward: ${globals.dims.feedforward_dim}
                activation: ${globals.activation}
                batch_first: True
                dropout: 0.0
              num_layers: ${globals.num_layers}
          postprocess_mlp: null
        eigenvectors_mlp:
          _target_: neural_laplacian.modules.architectures.ConfigurableMLP
          channels: ["${globals.dims.model_dim}", "${globals.eigenvectors_count}"]
          use_batch_norm: False
          use_layer_norm: False
          activation: null
        pooling: null
  optimizer:
    value:
      _target_: torch.optim.AdamW
      _partial_: true
      lr: 1e-3
  trainer:
    value:
      _target_: lightning.pytorch.Trainer
      max_epochs: 50
      devices: -1
      accelerator: 'auto'
      strategy: 'auto'
      num_sanity_val_steps: 1
      log_every_n_steps: 1
      check_val_every_n_epoch: 2
      gradient_clip_val: ${globals.gradient_clip_val}
      enable_progress_bar: True
      logger:
        _target_: lightning.pytorch.loggers.WandbLogger
        project: neural-laplacian
        save_dir: 'wandb'
        log_model: 'all'
      callbacks:
        - _target_: lightning.pytorch.callbacks.ModelCheckpoint
          dirpath: "./checkpoints"
          filename: "model-{epoch:010d}-{ReconstructionLoss:.4f}"
          monitor: "val/ReconstructionLoss"
          mode: "min"
          save_top_k: 1
          save_last: false
          verbose: false
          save_on_train_epoch_end: true